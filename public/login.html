<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Two Girls Brew - AI搭档后台 · 登录</title>
  <style>
    :root {
      --bg: #0a0a1a;
      --bg-card: #111128;
      --bg-input: #1a1a35;
      --text: #e0e0e0;
      --text-secondary: #8888aa;
      --accent: #E91E63;
      --accent-hover: #ff4081;
      --accent-glow: rgba(233, 30, 99, 0.3);
      --border: #2a2a4a;
      --success: #4CAF50;
      --warning: #FF9800;
      --error: #f44336;
      --radius: 12px;
      --transition: all 0.3s ease;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    /* 背景动画 */
    .bg-particles {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      pointer-events: none;
      z-index: 0;
    }
    .particle {
      position: absolute;
      background: var(--accent);
      border-radius: 50%;
      opacity: 0.15;
      animation: float 8s infinite ease-in-out;
    }
    @keyframes float {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-60px) scale(1.3); }
    }

    /* 主容器 */
    .login-container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 440px;
      padding: 20px;
    }

    /* Logo 区域 */
    .logo-section {
      text-align: center;
      margin-bottom: 30px;
    }
    .logo-icon {
      font-size: 48px;
      margin-bottom: 10px;
      animation: bounce 2s infinite;
    }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .logo-title {
      font-size: 26px;
      font-weight: 700;
      background: linear-gradient(135deg, #E91E63, #FF9800);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 1px;
    }
    .logo-subtitle {
      font-size: 13px;
      color: var(--text-secondary);
      margin-top: 4px;
      letter-spacing: 2px;
    }

    /* 卡片 */
    .login-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
      backdrop-filter: blur(10px);
    }

    /* Tab 切换 */
    .tab-group {
      display: flex;
      gap: 4px;
      background: var(--bg-input);
      border-radius: 10px;
      padding: 4px;
      margin-bottom: 24px;
    }
    .tab-btn {
      flex: 1;
      padding: 10px 16px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      border-radius: 8px;
      transition: var(--transition);
    }
    .tab-btn.active {
      background: var(--accent);
      color: #fff;
      box-shadow: 0 4px 12px var(--accent-glow);
    }

    /* 表单 */
    .form-group {
      margin-bottom: 18px;
    }
    .form-label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-secondary);
      margin-bottom: 6px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .form-input {
      width: 100%;
      padding: 12px 14px;
      background: var(--bg-input);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-size: 15px;
      transition: var(--transition);
      outline: none;
    }
    .form-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }
    .form-input::placeholder {
      color: #555;
    }

    /* 角色选择 */
    .role-selector {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 18px;
    }
    .role-option {
      padding: 12px 8px;
      background: var(--bg-input);
      border: 2px solid var(--border);
      border-radius: 10px;
      cursor: pointer;
      text-align: center;
      transition: var(--transition);
    }
    .role-option:hover {
      border-color: var(--accent);
    }
    .role-option.selected {
      border-color: var(--accent);
      background: rgba(233,30,99,0.1);
      box-shadow: 0 0 12px var(--accent-glow);
    }
    .role-icon {
      font-size: 28px;
      display: block;
      margin-bottom: 4px;
    }
    .role-name {
      font-size: 11px;
      color: var(--text-secondary);
      font-weight: 600;
    }
    .role-option.selected .role-name {
      color: var(--accent);
    }

    /* 按钮 */
    .btn {
      width: 100%;
      padding: 13px;
      border: none;
      border-radius: 10px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: var(--transition);
      letter-spacing: 0.5px;
    }
    .btn-primary {
      background: linear-gradient(135deg, #E91E63, #ff4081);
      color: #fff;
      box-shadow: 0 4px 16px var(--accent-glow);
    }
    .btn-primary:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px var(--accent-glow);
    }
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    /* 消息提示 */
    .message {
      padding: 10px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 16px;
      display: none;
      animation: slideDown 0.3s ease;
    }
    @keyframes slideDown {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .message.show { display: block; }
    .message.error {
      background: rgba(244,67,54,0.15);
      color: #f44336;
      border: 1px solid rgba(244,67,54,0.3);
    }
    .message.success {
      background: rgba(76,175,80,0.15);
      color: #4CAF50;
      border: 1px solid rgba(76,175,80,0.3);
    }

    /* 底部信息 */
    .footer-info {
      text-align: center;
      margin-top: 20px;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .footer-info a {
      color: var(--accent);
      text-decoration: none;
      cursor: pointer;
    }
    .footer-info a:hover {
      text-decoration: underline;
    }

    /* 预置账号提示 */
    .preset-hint {
      margin-top: 16px;
      padding: 10px 14px;
      background: rgba(255,152,0,0.08);
      border: 1px solid rgba(255,152,0,0.2);
      border-radius: 8px;
      font-size: 11px;
      color: var(--text-secondary);
      line-height: 1.6;
    }
    .preset-hint strong {
      color: var(--warning);
    }
    .preset-hint code {
      background: rgba(255,255,255,0.05);
      padding: 1px 5px;
      border-radius: 3px;
      font-size: 11px;
    }

    /* 响应式 */
    @media (max-width: 480px) {
      .login-container { padding: 12px; }
      .login-card { padding: 24px 18px; }
      .logo-title { font-size: 22px; }
    }
  </style>
</head>
<body>

  <!-- 背景粒子 -->
  <div class="bg-particles" id="particles"></div>

  <div class="login-container">
    <!-- Logo -->
    <div class="logo-section">
      <div class="logo-icon"><img src="/logo.jpg" alt="Two Girls Brew" style="width:64px;height:64px;object-fit:contain;border-radius:8px;" /></div>
      <div class="logo-title">Two Girls Brew</div>
      <div class="logo-subtitle">AI 搭档 · 智能后台管理系统</div>
    </div>

    <!-- 登录卡片 -->
    <div class="login-card">
      <!-- Tab -->
      <div class="tab-group">
        <button class="tab-btn active" onclick="switchTab('login')">登 录</button>
        <button class="tab-btn" onclick="switchTab('register')">注 册</button>
      </div>

      <!-- 消息提示 -->
      <div class="message" id="message"></div>

      <!-- 登录表单 -->
      <form id="loginForm" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label class="form-label">手机号 / 邮箱</label>
          <input type="text" class="form-input" id="loginAccount" placeholder="输入手机号或邮箱" autocomplete="username" required>
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="loginPassword" placeholder="输入密码" autocomplete="current-password" required>
        </div>
        <button type="submit" class="btn btn-primary" id="loginBtn">登 录</button>
      </form>

      <!-- 注册表单 -->
      <form id="registerForm" style="display:none" onsubmit="handleRegister(event)">
        <div class="form-group">
          <label class="form-label">姓名</label>
          <input type="text" class="form-input" id="regName" placeholder="请输入您的姓名" required>
        </div>
        <div class="form-group">
          <label class="form-label">手机号</label>
          <input type="tel" class="form-input" id="regPhone" placeholder="请输入手机号（选填）">
        </div>
        <div class="form-group">
          <label class="form-label">邮箱</label>
          <input type="email" class="form-input" id="regEmail" placeholder="请输入邮箱（选填）">
        </div>
        <div class="form-group">
          <label class="form-label">密码</label>
          <input type="password" class="form-input" id="regPassword" placeholder="至少6位密码" required minlength="6">
        </div>

        <!-- 角色选择 -->
        <label class="form-label">选择角色</label>
        <div class="role-selector" id="roleSelector">
          <div class="role-option" data-role="ceo" onclick="selectRole('ceo')">
            <span class="role-icon">👑</span>
            <span class="role-name">老板CEO</span>
          </div>
          <div class="role-option selected" data-role="admin" onclick="selectRole('admin')">
            <span class="role-icon">⚙️</span>
            <span class="role-name">技术管理员</span>
          </div>
          <div class="role-option" data-role="manager" onclick="selectRole('manager')">
            <span class="role-icon">🏪</span>
            <span class="role-name">门店店长</span>
          </div>
        </div>

        <button type="submit" class="btn btn-primary" id="registerBtn">注 册</button>
      </form>

      <!-- 预置账号提示 -->
      <div class="preset-hint" id="presetHint">
        <strong>🔑 预置测试账号（密码: admin123）</strong><br>
        👑 老板CEO黄总: <code>13800000001</code><br>
        ⚙️ 技术管理员TIM: <code>13800000002</code><br>
        🏪 门店店长: <code>13800000003</code>
      </div>
    </div>

    <div class="footer-info">
      Two Girls Brew &copy; Est.2012 · 厦门 · v3.2
    </div>
  </div>

  <script>
    // 背景粒子
    (function() {
      const container = document.getElementById('particles');
      const colors = ['#E91E63', '#FF9800', '#2196F3', '#4CAF50', '#9C27B0'];
      for (let i = 0; i < 30; i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = Math.random() * 4 + 2;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.left = Math.random() * 100 + '%';
        p.style.top = Math.random() * 100 + '%';
        p.style.background = colors[Math.floor(Math.random() * colors.length)];
        p.style.animationDelay = Math.random() * 8 + 's';
        p.style.animationDuration = (Math.random() * 6 + 4) + 's';
        container.appendChild(p);
      }
    })();

    // 状态
    let currentTab = 'login';
    let selectedRole = 'admin';

    // Tab 切换
    function switchTab(tab) {
      currentTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
      document.querySelectorAll('.tab-btn')[tab === 'login' ? 0 : 1].classList.add('active');
      document.getElementById('loginForm').style.display = tab === 'login' ? 'block' : 'none';
      document.getElementById('registerForm').style.display = tab === 'register' ? 'block' : 'none';
      document.getElementById('presetHint').style.display = tab === 'login' ? 'block' : 'none';
      hideMessage();
    }

    // 角色选择
    function selectRole(role) {
      selectedRole = role;
      document.querySelectorAll('.role-option').forEach(o => o.classList.remove('selected'));
      document.querySelector(`.role-option[data-role="${role}"]`).classList.add('selected');
    }

    // 消息显示
    function showMessage(text, type) {
      const msg = document.getElementById('message');
      msg.textContent = text;
      msg.className = 'message show ' + type;
      setTimeout(() => hideMessage(), 5000);
    }
    function hideMessage() {
      const msg = document.getElementById('message');
      msg.className = 'message';
    }

    // 登录
    async function handleLogin(e) {
      e.preventDefault();
      const account = document.getElementById('loginAccount').value.trim();
      const password = document.getElementById('loginPassword').value;
      const btn = document.getElementById('loginBtn');

      if (!account || !password) {
        showMessage('请输入账号和密码', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = '登录中...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ account, password })
        });
        const data = await res.json();

        if (data.success) {
          // 保存 token 和用户信息
          localStorage.setItem('token', data.data.token);
          localStorage.setItem('user', JSON.stringify(data.data.user));
          showMessage('登录成功！正在跳转...', 'success');
          setTimeout(() => {
            window.location.href = '/dashboard.html';
          }, 500);
        } else {
          showMessage(data.error || '登录失败', 'error');
          btn.disabled = false;
          btn.textContent = '登 录';
        }
      } catch (err) {
        showMessage('网络错误，请检查服务器连接', 'error');
        btn.disabled = false;
        btn.textContent = '登 录';
      }
    }

    // 注册
    async function handleRegister(e) {
      e.preventDefault();
      const name = document.getElementById('regName').value.trim();
      const phone = document.getElementById('regPhone').value.trim();
      const email = document.getElementById('regEmail').value.trim();
      const password = document.getElementById('regPassword').value;
      const btn = document.getElementById('registerBtn');

      if (!name) { showMessage('请输入姓名', 'error'); return; }
      if (!phone && !email) { showMessage('请至少输入手机号或邮箱', 'error'); return; }
      if (!password || password.length < 6) { showMessage('密码至少6位', 'error'); return; }

      btn.disabled = true;
      btn.textContent = '注册中...';

      try {
        const res = await fetch('/api/auth/register', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, phone: phone || undefined, email: email || undefined, password, role: selectedRole })
        });
        const data = await res.json();

        if (data.success) {
          showMessage('注册成功！请切换到登录页面进行登录', 'success');
          // 清空表单
          document.getElementById('regName').value = '';
          document.getElementById('regPhone').value = '';
          document.getElementById('regEmail').value = '';
          document.getElementById('regPassword').value = '';
          btn.textContent = '注 册';
          // 自动切换到登录页
          setTimeout(() => switchTab('login'), 1500);
        } else {
          showMessage(data.error || '注册失败', 'error');
        }
      } catch (err) {
        showMessage('网络错误，请检查服务器连接', 'error');
      }
      btn.disabled = false;
      btn.textContent = '注 册';
    }

    // 检查是否已登录
    (function checkLogin() {
      const token = localStorage.getItem('token');
      if (token) {
        fetch(`/api/auth/me?token=${token}`)
          .then(r => r.json())
          .then(data => {
            if (data.success) {
              window.location.href = '/dashboard.html';
            }
          })
          .catch(() => {});
      }
    })();
  </script>
</body>
</html>
