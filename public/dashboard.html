<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Two Girls Brew - AI搭档后台</title>
<style>
:root {
  --bg-primary: #0a0a1a;
  --bg-secondary: #12122a;
  --bg-card: #1a1a35;
  --bg-hover: #222244;
  --bg-input: #15152e;
  --border: #2a2a4a;
  --text-primary: #e8e8f0;
  --text-secondary: #8888aa;
  --text-muted: #555577;
  --accent: #E91E63;
  --accent-glow: rgba(233, 30, 99, 0.3);
  --gold: #FFD700;
  --green: #4CAF50;
  --blue: #2196F3;
  --orange: #FF9800;
  --purple: #9C27B0;
  --red: #F44336;
  --teal: #009688;
  --radius: 12px;
  --radius-sm: 8px;
  --transition: all 0.2s ease;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  line-height: 1.5;
  overflow: hidden;
  height: 100vh;
}
.app { display: flex; height: 100vh; }

/* 侧边栏 */
.sidebar {
  width: 260px;
  background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
}
.sidebar-header {
  padding: 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 12px;
}
.sidebar-logo {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, var(--accent), #ff6b9d);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px;
}
.sidebar-brand h2 { font-size: 14px; font-weight: 700; }
.sidebar-brand span { font-size: 11px; color: var(--text-secondary); }

/* 侧边栏用户信息 */
.sidebar-user {
  padding: 14px 16px;
  border-top: 1px solid var(--border);
  display: flex;
  align-items: center;
  gap: 10px;
  background: rgba(0,0,0,0.2);
}
.user-avatar {
  width: 36px; height: 36px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--accent), var(--orange));
  display: flex; align-items: center; justify-content: center;
  font-size: 18px;
  flex-shrink: 0;
}
.user-info {
  flex: 1;
  min-width: 0;
}
.user-name {
  font-size: 13px;
  font-weight: 600;
  color: var(--text-primary);
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}
.user-role {
  font-size: 11px;
  color: var(--accent);
  font-weight: 500;
}
.user-logout {
  width: 32px; height: 32px;
  border: 1px solid var(--border);
  border-radius: 8px;
  background: transparent;
  color: var(--text-secondary);
  font-size: 14px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: var(--transition);
  flex-shrink: 0;
}
.user-logout:hover {
  background: rgba(244,67,54,0.15);
  border-color: var(--red);
  color: var(--red);
}

.sidebar-actions {
  padding: 16px;
  display: flex; flex-direction: column; gap: 8px;
}
.btn {
  display: flex; align-items: center; gap: 8px;
  padding: 10px 14px;
  border-radius: var(--radius-sm);
  border: none;
  cursor: pointer;
  font-size: 13px;
  font-weight: 500;
  transition: var(--transition);
  color: var(--text-primary);
  width: 100%;
  text-align: left;
}
.btn-primary { background: var(--accent); }
.btn-primary:hover { background: #d81b60; transform: translateY(-1px); box-shadow: 0 4px 15px var(--accent-glow); }
.btn-outline { background: transparent; border: 1px solid var(--border); }
.btn-outline:hover { background: var(--bg-hover); border-color: var(--accent); }
.btn-ghost { background: transparent; color: var(--text-secondary); }
.btn-ghost:hover { background: var(--bg-hover); color: var(--text-primary); }
.btn-sm { padding: 6px 10px; font-size: 11px; width: auto; }

.sidebar-nav { flex: 1; overflow-y: auto; padding: 8px; }
.nav-section { margin-bottom: 8px; }
.nav-section-title {
  font-size: 10px; text-transform: uppercase;
  color: var(--text-muted); padding: 8px 12px 4px;
  letter-spacing: 1px; font-weight: 600;
}
.nav-item {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: var(--radius-sm);
  cursor: pointer; font-size: 13px; color: var(--text-secondary);
  transition: var(--transition); border: none; background: none; width: 100%; text-align: left;
}
.nav-item:hover { background: var(--bg-hover); color: var(--text-primary); }
.nav-item.active { background: var(--bg-hover); color: var(--accent); font-weight: 600; }
.nav-item .badge {
  margin-left: auto; font-size: 10px; padding: 2px 8px;
  border-radius: 10px; background: var(--accent); color: #fff;
}
.nav-item .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); margin-left: auto; }

/* 主内容区 */
.main { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
.topbar {
  height: 56px; background: var(--bg-secondary); border-bottom: 1px solid var(--border);
  display: flex; align-items: center; padding: 0 24px; gap: 16px;
}
.topbar-title { font-size: 16px; font-weight: 600; }
.topbar-subtitle { font-size: 12px; color: var(--text-secondary); }
.topbar-spacer { flex: 1; }
.topbar-status {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; color: var(--green);
}
.topbar-status::before { content: ''; width: 8px; height: 8px; border-radius: 50%; background: var(--green); }

.content { flex: 1; overflow-y: auto; padding: 24px; }
.content-section { display: none; }
.content-section.active { display: block; }

/* 统计卡片 */
.stats-grid { display: grid; grid-template-columns: repeat(5, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--bg-card); border-radius: var(--radius); padding: 16px;
  border: 1px solid var(--border); transition: var(--transition);
}
.stat-card:hover { border-color: var(--accent); transform: translateY(-2px); }
.stat-card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
.stat-card-icon { font-size: 24px; }
.stat-card-value { font-size: 28px; font-weight: 700; }
.stat-card-label { font-size: 12px; color: var(--text-secondary); margin-top: 4px; }

/* 智能体网格 */
.agent-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; }
.agent-card {
  background: var(--bg-card); border-radius: var(--radius); padding: 20px;
  border: 1px solid var(--border); cursor: pointer; transition: var(--transition);
  position: relative; overflow: hidden;
}
.agent-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: 0 8px 30px rgba(0,0,0,0.3); }
.agent-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
.agent-card-icon {
  width: 44px; height: 44px; border-radius: 12px;
  display: flex; align-items: center; justify-content: center; font-size: 22px;
}
.agent-card-name { font-size: 15px; font-weight: 600; }
.agent-card-domain { font-size: 11px; color: var(--text-secondary); }
.agent-card-badge {
  position: absolute; top: 12px; right: 12px;
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  font-weight: 600;
}
.badge-p0 { background: var(--red); color: #fff; }
.badge-p1 { background: var(--orange); color: #fff; }
.badge-p2 { background: var(--blue); color: #fff; }
.badge-p3 { background: var(--teal); color: #fff; }

/* 6层标签 */
.layer-tabs {
  display: flex; gap: 4px; margin-top: 12px;
  flex-wrap: wrap;
}
.layer-tab {
  font-size: 10px; padding: 3px 8px; border-radius: 6px;
  background: var(--bg-hover); color: var(--text-secondary);
  cursor: pointer; border: none; transition: var(--transition);
}
.layer-tab:hover { background: var(--accent); color: #fff; }
.layer-tab.active { background: var(--accent); color: #fff; }

/* 频道列表 */
.channel-list { display: flex; flex-direction: column; gap: 8px; }
.channel-item {
  display: flex; align-items: center; gap: 12px; padding: 12px 16px;
  background: var(--bg-card); border-radius: var(--radius-sm); border: 1px solid var(--border);
  transition: var(--transition);
}
.channel-item:hover { border-color: var(--accent); }
.channel-icon { font-size: 20px; }
.channel-info { flex: 1; }
.channel-name { font-size: 14px; font-weight: 500; }
.channel-type { font-size: 11px; color: var(--text-secondary); }
.channel-status {
  font-size: 11px; padding: 4px 10px; border-radius: 10px;
  font-weight: 500;
}
.status-connected { background: rgba(76,175,80,0.15); color: var(--green); }
.status-disconnected { background: rgba(255,255,255,0.05); color: var(--text-muted); }

/* MCP列表 */
.mcp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
.mcp-card {
  background: var(--bg-card); border-radius: var(--radius-sm); padding: 16px;
  border: 1px solid var(--border); display: flex; align-items: center; gap: 12px;
  transition: var(--transition); cursor: pointer;
}
.mcp-card:hover { border-color: var(--accent); }
.mcp-icon { font-size: 24px; }
.mcp-info { flex: 1; }
.mcp-name { font-size: 13px; font-weight: 500; }
.mcp-category { font-size: 10px; color: var(--text-secondary); }

/* 技能列表 */
.skill-list { display: flex; flex-direction: column; gap: 8px; }
.skill-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  background: var(--bg-card); border-radius: var(--radius-sm); border: 1px solid var(--border);
}
.skill-icon { font-size: 18px; }
.skill-info { flex: 1; }
.skill-name { font-size: 13px; font-weight: 500; }
.skill-desc { font-size: 11px; color: var(--text-secondary); }
.skill-source {
  font-size: 10px; padding: 2px 8px; border-radius: 6px;
  background: var(--bg-hover); color: var(--text-secondary);
}
.skill-source.github { background: rgba(33,150,243,0.15); color: var(--blue); }
.skill-source.clawhub { background: rgba(233,30,99,0.15); color: var(--accent); }
.skill-source.builtin { background: rgba(76,175,80,0.15); color: var(--green); }

/* 定时任务列表 */
.cron-list { display: flex; flex-direction: column; gap: 6px; }
.cron-item {
  display: flex; align-items: center; gap: 12px; padding: 10px 16px;
  background: var(--bg-card); border-radius: var(--radius-sm); border: 1px solid var(--border);
  font-size: 13px;
}
.cron-expr {
  font-family: 'SF Mono', 'Fira Code', monospace;
  font-size: 11px; padding: 3px 8px; border-radius: 4px;
  background: var(--bg-hover); color: var(--gold); min-width: 100px; text-align: center;
}
.cron-desc { flex: 1; }
.cron-agent { font-size: 11px; color: var(--text-secondary); }
.cron-toggle { cursor: pointer; }
.toggle { 
  width: 36px; height: 20px; border-radius: 10px; border: none;
  cursor: pointer; transition: var(--transition); position: relative;
}
.toggle.on { background: var(--green); }
.toggle.off { background: var(--border); }
.toggle::after {
  content: ''; position: absolute; top: 2px; left: 2px;
  width: 16px; height: 16px; border-radius: 50%; background: #fff;
  transition: var(--transition);
}
.toggle.on::after { left: 18px; }

/* 详情弹窗 */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(0,0,0,0.6);
  display: flex; align-items: center; justify-content: center; z-index: 1000;
  backdrop-filter: blur(4px);
}
.modal {
  background: var(--bg-secondary); border-radius: var(--radius);
  border: 1px solid var(--border); width: 800px; max-height: 80vh;
  display: flex; flex-direction: column; box-shadow: 0 20px 60px rgba(0,0,0,0.5);
}
.modal-header {
  padding: 20px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.modal-title { display: flex; align-items: center; gap: 10px; font-size: 16px; font-weight: 600; }
.modal-close {
  background: none; border: none; color: var(--text-secondary); font-size: 20px;
  cursor: pointer; padding: 4px 8px; border-radius: 6px;
}
.modal-close:hover { background: var(--bg-hover); color: var(--text-primary); }
.modal-body { padding: 24px; overflow-y: auto; flex: 1; }
.modal-body pre {
  white-space: pre-wrap; font-size: 13px; line-height: 1.8;
  color: var(--text-secondary); font-family: inherit;
}

/* 空状态 */
.empty-state {
  text-align: center; padding: 60px 20px; color: var(--text-muted);
}
.empty-state-icon { font-size: 48px; margin-bottom: 16px; }
.empty-state h3 { font-size: 16px; margin-bottom: 8px; color: var(--text-secondary); }

/* 对话区域 */
.chat-area {
  display: flex; flex-direction: column; height: calc(100vh - 56px);
}
.chat-messages { flex: 1; overflow-y: auto; padding: 24px; }
.chat-input-area {
  padding: 16px 24px; border-top: 1px solid var(--border);
  background: var(--bg-secondary);
}
.chat-input-wrap {
  display: flex; gap: 8px; background: var(--bg-input);
  border-radius: var(--radius); border: 1px solid var(--border);
  padding: 8px 16px;
}
.chat-input-wrap:focus-within { border-color: var(--accent); }
.chat-input {
  flex: 1; background: none; border: none; color: var(--text-primary);
  font-size: 14px; outline: none; padding: 8px 0;
}
.chat-input::placeholder { color: var(--text-muted); }
.chat-send {
  background: var(--accent); border: none; color: #fff;
  padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
}
.chat-send:hover { background: #d81b60; }
.chat-send:disabled { opacity: 0.5; cursor: not-allowed; }

/* typing dots 动画 */
@keyframes typingDots {
  0%, 20% { content: '.'; }
  40% { content: '..'; }
  60%, 100% { content: '...'; }
}
.typing-dots::after {
  content: '';
  animation: typingDots 1.4s infinite;
}

/* ===== 设置面板 ===== */
.settings-tabs {
  display: flex; gap: 4px; margin-bottom: 20px;
  background: var(--bg-card); border-radius: var(--radius); padding: 4px;
  border: 1px solid var(--border);
}
.settings-tab {
  flex: 1; padding: 10px 16px; border-radius: var(--radius-sm); border: none;
  background: transparent; color: var(--text-secondary); cursor: pointer;
  font-size: 13px; font-weight: 500; transition: var(--transition);
  text-align: center;
}
.settings-tab:hover { color: var(--text-primary); }
.settings-tab.active { background: var(--accent); color: #fff; }
.settings-panel { display: none; }
.settings-panel.active { display: block; }

/* 提供商卡片 */
.provider-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.provider-card {
  background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 16px; transition: var(--transition); position: relative;
}
.provider-card:hover { border-color: var(--accent); }
.provider-card-header {
  display: flex; align-items: center; gap: 12px; margin-bottom: 10px;
}
.provider-icon {
  width: 40px; height: 40px; border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
  background: var(--bg-hover);
}
.provider-name { font-size: 14px; font-weight: 600; }
.provider-provider { font-size: 11px; color: var(--text-secondary); }
.provider-models {
  display: flex; gap: 4px; flex-wrap: wrap; margin-bottom: 10px;
}
.provider-model-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 4px;
  background: var(--bg-hover); color: var(--text-secondary);
}
.provider-model-tag.default { background: rgba(233,30,99,0.15); color: var(--accent); }
.provider-actions {
  display: flex; gap: 8px; align-items: center; margin-top: 10px;
}
.provider-actions .btn { width: auto; }
.provider-status {
  font-size: 11px; padding: 3px 10px; border-radius: 8px; font-weight: 500;
}

/* 添加提供商表单 */
.provider-form-card {
  background: var(--bg-card); border: 1px dashed var(--border); border-radius: var(--radius);
  padding: 24px;
}
.provider-form-card:hover { border-color: var(--accent); }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
.form-field { display: flex; flex-direction: column; gap: 4px; }
.form-field.full { grid-column: 1 / -1; }
.form-label { font-size: 11px; color: var(--text-secondary); font-weight: 500; text-transform: uppercase; letter-spacing: 0.5px; }
.form-input {
  background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 12px; color: var(--text-primary); font-size: 13px; outline: none;
  transition: var(--transition); font-family: inherit;
}
.form-input:focus { border-color: var(--accent); }
.form-input::placeholder { color: var(--text-muted); }
.form-hint { font-size: 10px; color: var(--text-muted); }

/* 模型标签输入 */
.model-tags-area {
  display: flex; flex-wrap: wrap; gap: 4px; padding: 6px 8px;
  background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm);
  min-height: 40px; align-items: center;
}
.model-tags-area:focus-within { border-color: var(--accent); }
.model-tag-item {
  display: flex; align-items: center; gap: 4px;
  font-size: 11px; padding: 3px 8px; border-radius: 4px;
  background: var(--accent); color: #fff;
}
.model-tag-remove {
  cursor: pointer; font-size: 14px; line-height: 1; opacity: 0.7;
}
.model-tag-remove:hover { opacity: 1; }
.model-tag-input {
  flex: 1; min-width: 120px; background: none; border: none;
  color: var(--text-primary); font-size: 13px; outline: none; padding: 4px;
  font-family: inherit;
}

/* 预设提供商快捷选择 */
.quick-presets {
  display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px;
}
.quick-preset {
  font-size: 11px; padding: 4px 10px; border-radius: 6px;
  background: var(--bg-hover); color: var(--text-secondary); border: 1px solid var(--border);
  cursor: pointer; transition: var(--transition);
}
.quick-preset:hover { border-color: var(--accent); color: var(--text-primary); }

/* 提示消息 */
.toast {
  position: fixed; top: 20px; right: 20px; z-index: 2000;
  padding: 12px 20px; border-radius: var(--radius-sm); font-size: 13px;
  animation: slideIn 0.3s ease; box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.toast.success { background: var(--green); color: #fff; }
.toast.error { background: var(--red); color: #fff; }
@keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

/* 设置面板内通用设置 */
.settings-section {
  background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 20px; margin-bottom: 16px;
}
.settings-section-title {
  font-size: 15px; font-weight: 600; margin-bottom: 12px;
  display: flex; align-items: center; gap: 8px;
}

/* ===== 资源库样式 ===== */
.resource-toolbar {
  display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; align-items: center;
}
.resource-toolbar .search-input {
  flex: 1; min-width: 200px;
  background: var(--bg-input); border: 1px solid var(--border); border-radius: var(--radius-sm);
  padding: 10px 14px; color: var(--text-primary); font-size: 13px; outline: none;
  transition: var(--transition);
}
.resource-toolbar .search-input:focus { border-color: var(--accent); }
.resource-toolbar .search-input::placeholder { color: var(--text-muted); }
.category-filter {
  display: flex; gap: 4px; flex-wrap: wrap;
}
.category-chip {
  font-size: 11px; padding: 6px 12px; border-radius: 16px; border: 1px solid var(--border);
  background: transparent; color: var(--text-secondary); cursor: pointer; transition: var(--transition);
  white-space: nowrap;
}
.category-chip:hover { border-color: var(--accent); color: var(--text-primary); }
.category-chip.active { background: var(--accent); border-color: var(--accent); color: #fff; }
.resource-grid {
  display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px;
}
.resource-card {
  background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border);
  padding: 16px; transition: var(--transition); cursor: pointer; position: relative;
}
.resource-card:hover { border-color: var(--accent); transform: translateY(-1px); }
.resource-card-header {
  display: flex; align-items: flex-start; justify-content: space-between; gap: 8px; margin-bottom: 8px;
}
.resource-card-title { font-size: 14px; font-weight: 600; flex: 1; }
.resource-card-cat {
  font-size: 10px; padding: 2px 8px; border-radius: 8px; white-space: nowrap;
}
.resource-card-preview {
  font-size: 12px; color: var(--text-secondary); line-height: 1.6;
  display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;
}
.resource-card-meta {
  display: flex; align-items: center; gap: 12px; margin-top: 10px; font-size: 11px; color: var(--text-muted);
}
.resource-tags { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
.resource-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 4px; background: var(--bg-hover); color: var(--text-secondary);
}
.resource-card-actions {
  display: flex; gap: 4px; opacity: 0; transition: var(--transition);
}
.resource-card:hover .resource-card-actions { opacity: 1; }
.resource-detail-header {

}
.resource-detail-content {

}
.batch-add-grid {
  display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; margin-bottom: 16px;
}
.batch-add-card {
  background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border);

}

  .provider-grid { grid-template-columns: 1fr; }
  .form-grid { grid-template-columns: 1fr; }

  .batch-add-grid { grid-template-columns: repeat(2, 1fr); }
}

<script>
// ========== 认证检查 ==========
const TOKEN = localStorage.getItem('token');
const CURRENT_USER = JSON.parse(localStorage.getItem('user') || 'null');

if (!TOKEN || !CURRENT_USER) {
  window.location.href = '/login.html';
}

// 验证 token 有效性
fetch(`/api/auth/me?token=${TOKEN}`)
  .then(r => r.json())
  .then(data => {
    if (!data.success) {
      localStorage.removeItem('token');
      localStorage.removeItem('user');
      window.location.href = '/login.html';
    }
  })
  .catch(() => {
    // 允许继续（本地服务器可能暂时不可用）
  });

// 权限检查辅助函数
function hasPermission(permission) {
  if (!CURRENT_USER || !CURRENT_USER.permissions) return false;
  return CURRENT_USER.permissions.includes('*') || CURRENT_USER.permissions.includes(permission);
}

// 退出登录
function logout() {
  fetch('/api/auth/logout', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ token: TOKEN })
  }).finally(() => {
    localStorage.removeItem('token');
    localStorage.removeItem('user');
    window.location.href = '/login.html';
  });
}

// ========== 状态管理 ==========
const state = {
  agents: [],
  channels: [],
  mcp: [],
  skills: [],
  cronJobs: [],
  providers: [],
  resources: [],
  resourceCategories: [],
  stats: {},
  currentSection: 'dashboard',
  providerModels: [], // 添加表单中的模型标签暂存
  resourceFilter: 'all', // 资源库分类筛选
  resourceSearch: '', // 资源库搜索
  resourceTab: 'text' // 资源添加表单tab切换
};

const LAYERS = ['identity', 'memory', 'soul', 'user', 'agent', 'tools'];
const LAYER_NAMES = { identity: '身份层', memory: '记忆层', soul: '灵魂层', user: '用户层', agent: '代理层', tools: '工具层' };
const LAYER_ICONS = { identity: '🆔', memory: '🧠', soul: '💫', user: '👤', agent: '⚙️', tools: '🔧' };

// ========== API调用 ==========
async function fetchData() {
  const res = await fetch('/api/dashboard');
  const json = await res.json();
  if (json.success) {
    state.agents = json.data.agents;
    state.channels = json.data.channels;
    state.mcp = json.data.mcp;
    state.skills = json.data.skills;
    state.cronJobs = json.data.cronJobs;
    state.providers = json.data.providers || [];
    state.resources = json.data.resources || [];
    state.resourceCategories = json.data.resourceCategories || [];
    state.stats = json.data.stats;
  }
}

      </div>

        <div class="stat-card-label">知识库资料</div>

    <div class="agent-grid">

          <span class="agent-card-badge badge-p${a.priority > 2 ? '2' : a.priority > 1 ? '1' : '0'}">P${a.priority}</span>

}

function renderAgents() {
  document.getElementById('section-agents').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">

          <textarea class="form-input" id="agentMemory" rows="2" placeholder="记住以下关键信息..."></textarea>
        </div>
        <div class="form-field full">
          <label class="form-label">工具层Prompt (tools) - 可用工具</label>
          <textarea class="form-input" id="agentTools" rows="2" placeholder="你可以使用以下工具..."></textarea>
        </div>
        <div class="form-field full" style="display:flex;gap:8px;justify-content:flex-end">
          <button class="btn btn-ghost btn-sm" onclick="document.getElementById('addAgentFormContainer').style.display='none'">取消</button>
          <button class="btn btn-primary btn-sm" onclick="submitAddAgent()">✅ 创建AI搭档</button>
        </div>
      </div>
    </div>
  `;
}

async function submitAddAgent() {
  const name = document.getElementById('agentName').value.trim();
  if (!name) { showToast('请输入搭档名称', 'error'); return; }
  
  const data = {
    name,
    icon: document.getElementById('agentIcon').value.trim() || '🤖',
    domain: document.getElementById('agentDomain').value.trim() || 'custom',
    description: document.getElementById('agentDesc').value.trim(),
    priority: parseInt(document.getElementById('agentPriority').value),
    color: document.getElementById('agentColor').value,
    identityPrompt: document.getElementById('agentIdentity').value.trim(),
    memoryPrompt: document.getElementById('agentMemory').value.trim(),
    toolsPrompt: document.getElementById('agentTools').value.trim()
  };
  
  try {
    const res = await fetch('/api/custom-agents', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(data)
    });
    const json = await res.json();
    if (json.success) {
      document.getElementById('addAgentFormContainer').style.display = 'none';
      await fetchData();
      renderAgents();
      renderDashboard();
      renderSidebar();
      showToast('✅ AI搭档已创建: ' + name, 'success');
    } else {
      showToast('创建失败: ' + json.error, 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

async function deleteCustomAgent(id) {
  const agent = state.agents.find(a => a.id === id);
  if (!agent || !confirm(`确定要删除自定义AI搭档 "${agent.name}" 吗？此操作不可撤销。`)) return;
  
  try {
    const res = await fetch(`/api/custom-agents/${id}`, { method: 'DELETE' });
    const json = await res.json();
    if (json.success) {
      await fetchData();
      renderAgents();
      renderDashboard();
      renderSidebar();
      showToast('已删除: ' + agent.name, 'success');
    } else {
      showToast('删除失败: ' + json.error, 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

  const data = {

function fillPreset(preset) {
  const presets = {
    deepseek: { name: 'DeepSeek', provider: 'deepseek', icon: '🔍', endpoint: 'https://api.deepseek.com/v1', models: ['deepseek-chat', 'deepseek-reasoner'], defaultModel: 'deepseek-chat' },
    qwen: { name: '通义千问', provider: 'qwen', icon: '☁️', endpoint: 'https://dashscope.aliyuncs.com/compatible-mode/v1', models: ['qwen-max', 'qwen-plus', 'qwen-turbo'], defaultModel: 'qwen-plus' },
    zhipu: { name: '智谱 GLM', provider: 'zhipu', icon: '📚', endpoint: 'https://open.bigmodel.cn/api/paas/v4', models: ['glm-4-plus', 'glm-4-flash', 'glm-4-air'], defaultModel: 'glm-4-flash' },
    moonshot: { name: 'Moonshot', provider: 'moonshot', icon: '🌙', endpoint: 'https://api.moonshot.cn/v1', models: ['moonshot-v1-8k', 'moonshot-v1-32k', 'moonshot-v1-128k'], defaultModel: 'moonshot-v1-32k' },
    baidu: { name: '百度文心', provider: 'baidu', icon: '📖', endpoint: 'https://aip.baidubce.com', models: ['ernie-4.0-turbo', 'ernie-3.5', 'ernie-speed'], defaultModel: 'ernie-4.0-turbo' },
    openai: { name: 'OpenAI兼容', provider: 'openai-compat', icon: '🤖', endpoint: 'https://api.openai.com/v1', models: ['gpt-4o', 'gpt-4o-mini'], defaultModel: 'gpt-4o' },
    ollama: { name: 'Ollama 本地', provider: 'ollama', icon: '🦙', endpoint: 'http://localhost:11434/v1', models: ['llama3', 'qwen2.5', 'deepseek-r1'], defaultModel: 'llama3' }
  };
  const p = presets[preset];
  if (!p) return;
  document.getElementById('provName').value = p.name;
  document.getElementById('provProvider').value = p.provider;
  document.getElementById('provIcon').value = p.icon;
  document.getElementById('provEndpoint').value = p.endpoint;
  document.getElementById('provDefaultModel').value = p.defaultModel;
  state.providerModels = [...p.models];
  renderModelTags();
  showToast('已填充预设: ' + p.name, 'success');
}

function addModelTag(e) {
  if (e.key !== 'Enter') return;
  e.preventDefault();
  const input = document.getElementById('modelTagInput');
  const val = input.value.trim();
  if (val && !state.providerModels.includes(val)) {
    state.providerModels.push(val);
    input.value = '';
    renderModelTags();
  }
}

function removeModelTag(model) {
  state.providerModels = state.providerModels.filter(m => m !== model);
  renderModelTags();
}

function renderModelTags() {
  const area = document.getElementById('modelTagsArea');
  if (!area) return;
  area.innerHTML = state.providerModels.map(m => `
    <span class="model-tag-item">${m}<span class="model-tag-remove" onclick="removeModelTag('${m}')">✕</span></span>
  `).join('') + '<input class="model-tag-input" id="modelTagInput" placeholder="输入模型名后按回车添加..." onkeydown="addModelTag(event)">';
  setTimeout(() => document.getElementById('modelTagInput')?.focus(), 50);
}

function cancelAddProvider() {
  document.getElementById('addProviderForm').style.display = 'none';
  state.providerModels = [];
}

async function submitProvider() {
  const name = document.getElementById('provName').value.trim();
  const provider = document.getElementById('provProvider').value.trim();
  if (!name || !provider) { showToast('请填写提供商名称和标识', 'error'); return; }

  const newProvider = {
    name,
    provider,
    icon: document.getElementById('provIcon').value.trim() || '🔌',
    endpoint: document.getElementById('provEndpoint').value.trim(),
    apiKey: document.getElementById('provApiKey').value.trim(),
    defaultModel: document.getElementById('provDefaultModel').value.trim(),
    models: [...state.providerModels]
  };

  try {
    const res = await fetch('/api/providers', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newProvider)
    });
    const json = await res.json();
    if (json.success) {
      state.providers.push(json.data);
      state.providerModels = [];
      document.getElementById('addProviderForm').style.display = 'none';
      document.getElementById('providerGrid').innerHTML = state.providers.map(p => renderProviderCard(p)).join('');
      showToast('提供商已添加: ' + name, 'success');
    } else {
      showToast('添加失败: ' + json.error, 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

async function editProvider(id) {
  const p = state.providers.find(pr => pr.id === id);
  if (!p) return;

  state.providerModels = [...p.models];
  document.getElementById('addProviderForm').style.display = 'block';
  document.getElementById('addProviderForm').innerHTML = `

          <div class="model-tags-area" id="modelTagsArea">
            <input class="model-tag-input" id="modelTagInput" placeholder="输入模型名后按回车添加..." onkeydown="addModelTag(event)">

        </div>
      </div>

  renderModelTags();

async function submitEditProvider(id) {
  const name = document.getElementById('provName').value.trim();
  const provider = document.getElementById('provProvider').value.trim();
  if (!name || !provider) { showToast('请填写提供商名称和标识', 'error'); return; }

  const updates = {
    name,
    provider,
    icon: document.getElementById('provIcon').value.trim() || '🔌',
    endpoint: document.getElementById('provEndpoint').value.trim(),
    defaultModel: document.getElementById('provDefaultModel').value.trim(),
    models: [...state.providerModels]
  };
  const apiKey = document.getElementById('provApiKey').value.trim();
  if (apiKey) updates.apiKey = apiKey;

  try {
    const res = await fetch(`/api/providers/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    const json = await res.json();
    if (json.success) {
      const idx = state.providers.findIndex(pr => pr.id === id);
      if (idx !== -1) state.providers[idx] = json.data;
      state.providerModels = [];
      document.getElementById('addProviderForm').style.display = 'none';
      document.getElementById('providerGrid').innerHTML = state.providers.map(p => renderProviderCard(p)).join('');
      showToast('提供商已更新: ' + name, 'success');
    } else {
      showToast('更新失败: ' + json.error, 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

async function deleteProvider(id) {
  const p = state.providers.find(pr => pr.id === id);
  if (!p || !confirm(`确定要删除 "${p.name}" 吗？此操作不可撤销。`)) return;

  try {
    const res = await fetch(`/api/providers/${id}`, { method: 'DELETE' });
    const json = await res.json();
    if (json.success) {
      state.providers = state.providers.filter(pr => pr.id !== id);
      document.getElementById('providerGrid').innerHTML = state.providers.map(p => renderProviderCard(p)).join('');
      showToast('已删除: ' + p.name, 'success');
    } else {
      showToast('删除失败: ' + json.error, 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

async function toggleProvider(id) {
  const p = state.providers.find(pr => pr.id === id);
  if (!p) return;
  try {
    const res = await fetch(`/api/providers/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ connected: !p.connected })
    });
    const json = await res.json();
    if (json.success) {
      p.connected = json.data.connected;
      document.getElementById('providerGrid').innerHTML = state.providers.map(p => renderProviderCard(p)).join('');
    }
  } catch (e) {
    showToast('操作失败', 'error');
  }
}

// 当前选中的prompt编辑智能体
let currentPromptAgent = null;
let currentPromptLayer = 'identity';

async function selectPromptAgent(agentId) {
  currentPromptAgent = agentId;
  currentPromptLayer = 'identity';
  
  // 高亮选中项
  document.querySelectorAll('.prompt-agent-item').forEach(el => el.style.background = '');
  const item = document.getElementById('promptAgent-' + agentId);
  if (item) item.style.background = 'var(--bg-hover)';
  
  const agent = state.agents.find(a => a.id === agentId);
  if (!agent) return;
  
  try {
    const res = await fetch('/api/prompts/' + agentId);
    const json = await res.json();
    if (json.success) {
      renderPromptEditor(agent, json.data.layers);
    }
  } catch (e) {
    showToast('加载Prompt失败', 'error');
  }
}

function renderPromptEditor(agent, layers) {
  const area = document.getElementById('promptEditorArea');
  area.innerHTML = `
    <div style="background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);overflow:hidden">
      <div style="padding:16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:12px">
        <span style="font-size:24px">${agent.icon}</span>
        <div>
          <div style="font-size:15px;font-weight:600">${agent.name}</div>
          <div style="font-size:11px;color:var(--text-secondary)">${agent.domain} · P${agent.priority}</div>
        </div>
        <span style="flex:1"></span>
        <button class="btn btn-outline btn-sm" onclick="selectPromptAgent('${agent.id}')">🔄 刷新</button>
      </div>
      <div style="display:flex;border-bottom:1px solid var(--border)">
        ${LAYERS.map((l, i) => `
          <button class="prompt-layer-tab" id="promptLayerTab-${l}" onclick="switchPromptLayer('${l}')" style="flex:1;padding:10px 8px;border:none;background:transparent;color:var(--text-secondary);cursor:pointer;font-size:12px;transition:var(--transition);border-bottom:2px solid transparent;text-align:center">
            ${LAYER_ICONS[l]} ${LAYER_NAMES[l]}
          </button>
        `).join('')}
      </div>
      <div style="padding:16px" id="promptLayerContent">
        <div style="text-align:center;color:var(--text-muted);padding:20px">加载中...</div>
      </div>
    </div>
  `;
  // 默认显示identity层
  switchPromptLayer('identity');
  
  // 保存layers到全局
  window._promptLayers = layers;
}

function switchPromptLayer(layer) {
  currentPromptLayer = layer;
  
  // 更新tab样式
  document.querySelectorAll('.prompt-layer-tab').forEach(t => {
    t.style.color = 'var(--text-secondary)';
    t.style.borderBottomColor = 'transparent';
    t.style.fontWeight = 'normal';
  });
  const tab = document.getElementById('promptLayerTab-' + layer);
  if (tab) {
    tab.style.color = 'var(--accent)';
    tab.style.borderBottomColor = 'var(--accent)';
    tab.style.fontWeight = '600';
  }
  
  const content = window._promptLayers ? window._promptLayers[layer] || '' : '';
  const container = document.getElementById('promptLayerContent');
  if (!container) return;
  
  container.innerHTML = `
    <div style="margin-bottom:12px;display:flex;align-items:center;gap:8px">
      <span style="font-size:14px;font-weight:600">${LAYER_ICONS[layer]} ${LAYER_NAMES[layer]} Prompt</span>
      <span style="font-size:10px;color:var(--text-muted)">${currentPromptAgent}/${layer}.md</span>
    </div>
    <textarea id="promptTextarea" style="width:100%;height:350px;background:var(--bg-input);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;color:var(--text-primary);font-size:13px;font-family:'SF Mono','Fira Code','Menlo',monospace;line-height:1.6;resize:vertical;outline:none" spellcheck="false">${escapeHtml(content)}</textarea>
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick="selectPromptAgent('${currentPromptAgent}')">↩ 撤销修改</button>
      <button class="btn btn-primary btn-sm" onclick="savePromptLayer('${layer}')">💾 保存 ${LAYER_NAMES[layer]}</button>
    </div>
  `;
  
  setTimeout(() => {
    const ta = document.getElementById('promptTextarea');
    if (ta) ta.focus();
  }, 100);
}

async function savePromptLayer(layer) {
  const textarea = document.getElementById('promptTextarea');
  if (!textarea) return;
  
  const content = textarea.value;
  
  try {
    const res = await fetch(`/api/prompts/${currentPromptAgent}/${layer}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content })
    });
    const json = await res.json();
    if (json.success) {
      // 更新内存中的layers
      if (window._promptLayers) {
        window._promptLayers[layer] = content;
      }
      showToast(`✅ ${LAYER_NAMES[layer]} 已保存${json.data.saved ? ' (已写入文件)' : ''}`, 'success');
    } else {
      showToast('保存失败: ' + json.error, 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

async function submitChannel() {
  const name = document.getElementById('chName').value.trim();
  const type = document.getElementById('chType').value;
  if (!name) { showToast('请填写频道名称', 'error'); return; }
  
  let config = {};
  try {
    const configStr = document.getElementById('chConfig').value.trim();
    if (configStr) config = JSON.parse(configStr);
  } catch (e) {
    showToast('配置JSON格式错误', 'error');
    return;
  }
  
  const newChannel = {
    name,
    type,
    icon: document.getElementById('chIcon').value.trim() || '📡',
    config
  };
  
  try {
    const res = await fetch('/api/channel-settings', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(newChannel)
    });
    const json = await res.json();
    if (json.success) {
      state.channels.push(json.data);
      document.getElementById('addChannelForm').style.display = 'none';
      document.getElementById('channelSettingsList').innerHTML = state.channels.map(ch => renderChannelSettingItem(ch)).join('');

      showToast('频道已添加: ' + name, 'success');
    } else {
      showToast('添加失败: ' + json.error, 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

async function submitEditChannel(id) {
  const name = document.getElementById('chName').value.trim();
  const type = document.getElementById('chType').value;
  if (!name) { showToast('请填写频道名称', 'error'); return; }
  
  let config = {};
  try {
    const configStr = document.getElementById('chConfig').value.trim();
    if (configStr) config = JSON.parse(configStr);
  } catch (e) {
    showToast('配置JSON格式错误', 'error');
    return;
  }
  
  const updates = {
    name,
    type,
    icon: document.getElementById('chIcon').value.trim() || '📡',
    config
  };
  
  try {
    const res = await fetch('/api/channel-settings/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(updates)
    });
    const json = await res.json();
    if (json.success) {
      const idx = state.channels.findIndex(c => c.id === id);
      if (idx !== -1) state.channels[idx] = json.data;
      document.getElementById('addChannelForm').style.display = 'none';
      document.getElementById('channelSettingsList').innerHTML = state.channels.map(ch => renderChannelSettingItem(ch)).join('');
      renderSidebar();
      showToast('频道已更新: ' + name, 'success');
    } else {
      showToast('更新失败: ' + json.error, 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

async function deleteChannel(id) {
  const ch = state.channels.find(c => c.id === id);
  if (!ch || !confirm(`确定要删除频道 "${ch.name}" 吗？`)) return;
  
  try {
    const res = await fetch('/api/channel-settings/' + id, { method: 'DELETE' });
    const json = await res.json();
    if (json.success) {
      state.channels = state.channels.filter(c => c.id !== id);
      document.getElementById('channelSettingsList').innerHTML = state.channels.map(ch => renderChannelSettingItem(ch)).join('');
      renderSidebar();
      showToast('已删除频道: ' + ch.name, 'success');
    } else {
      showToast('删除失败: ' + json.error, 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

async function toggleChannel(id) {
  const ch = state.channels.find(c => c.id === id);
  if (!ch) return;
  try {
    const res = await fetch('/api/channel-settings/' + id, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ connected: !ch.connected })
    });
    const json = await res.json();
    if (json.success) {
      ch.connected = json.data.connected;
      document.getElementById('channelSettingsList').innerHTML = state.channels.map(ch => renderChannelSettingItem(ch)).join('');
      renderSidebar();
    }
  } catch (e) {
    showToast('操作失败', 'error');
  }
}

async function loadLayerInModal(agentId, layer) {
  // 更新tab状态
  document.querySelectorAll('[id^="modalLayerTab-"]').forEach(t => t.classList.remove('active'));
  const tab = document.getElementById(`modalLayerTab-${layer}`);
  if (tab) tab.classList.add('active');

  const content = document.getElementById('modalLayerContent');
  content.innerHTML = '<div style="text-align:center;color:var(--text-muted);padding:40px">加载中...</div>';

  try {
    // 先尝试从prompts API获取
    const promptRes = await fetch(`/api/prompts/${agentId}`);
    const promptJson = await promptRes.json();
    
    if (promptJson.success && promptJson.data.layers && promptJson.data.layers[layer]) {
      const text = promptJson.data.layers[layer]
        .replace(/^### (.+)$/gm, '<h4 style="color:var(--gold);margin:16px 0 8px;font-size:14px">$1</h4>')
        .replace(/^## (.+)$/gm, '<h3 style="color:var(--accent);margin:20px 0 10px;font-size:16px">$1</h3>')
        .replace(/^# (.+)$/gm, '<h2 style="color:var(--accent);margin:24px 0 12px;font-size:18px">$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text-primary)">$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code style="background:var(--bg-hover);padding:2px 6px;border-radius:4px;font-size:12px">$1</code>')
        .replace(/^- (.+)$/gm, '<li style="margin-left:16px;color:var(--text-secondary)">$1</li>')
        .replace(/^\|(.+)\|$/gm, (match) => {
          if (match.includes('---')) return '';
          const cells = match.split('|').filter(c => c.trim());
          const isHeader = cells.some(c => c.includes('---'));
          const tag = isHeader ? 'th' : 'td';
          return '<tr>' + cells.map(c => `<${tag} style="padding:6px 12px;border:1px solid var(--border);font-size:12px;text-align:left">${c.trim()}</${tag}>`).join('') + '</tr>';
        })
        .replace(/(<tr>.*<\/tr>\n?)+/g, (match) => `<table style="width:100%;border-collapse:collapse;margin:12px 0">${match}</table>`)
        .replace(/\n\n/g, '<br><br>')
        .replace(/```yaml\n?([\s\S]*?)```/g, '<pre style="background:var(--bg-input);padding:16px;border-radius:8px;overflow-x:auto;font-size:12px;line-height:1.6;color:var(--text-secondary)">$1</pre>')
        .replace(/```json\n?([\s\S]*?)```/g, '<pre style="background:var(--bg-input);padding:16px;border-radius:8px;overflow-x:auto;font-size:12px;line-height:1.6;color:var(--text-secondary)">$1</pre>')
        .replace(/```\n?([\s\S]*?)```/g, '<pre style="background:var(--bg-input);padding:16px;border-radius:8px;overflow-x:auto;font-size:12px;line-height:1.6;color:var(--text-secondary)">$1</pre>')

        .replace(/---/g, '<hr style="border:none;border-top:1px solid var(--border);margin:16px 0">');

      content.innerHTML = `<div style="line-height:1.8;font-size:13px">${text || '<span style="color:var(--text-muted)">此层暂无内容，可在设置中编辑</span>'}</div>`;
      return;
    }

    // 回退到agents API
    const res = await fetch(`/api/agents/${agentId}/${layer}`);
    const json = await res.json();
    if (json.success) {
      const text = json.data.content
        .replace(/^### (.+)$/gm, '<h4 style="color:var(--gold);margin:16px 0 8px;font-size:14px">$1</h4>')
        .replace(/^## (.+)$/gm, '<h3 style="color:var(--accent);margin:20px 0 10px;font-size:16px">$1</h3>')
        .replace(/^# (.+)$/gm, '<h2 style="color:var(--accent);margin:24px 0 12px;font-size:18px">$1</h2>')
        .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text-primary)">$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/`([^`]+)`/g, '<code style="background:var(--bg-hover);padding:2px 6px;border-radius:4px;font-size:12px">$1</code>')
        .replace(/^- (.+)$/gm, '<li style="margin-left:16px;color:var(--text-secondary)">$1</li>')
        .replace(/^\|(.+)\|$/gm, (match) => {
          if (match.includes('---')) return '';
          const cells = match.split('|').filter(c => c.trim());
          const isHeader = cells.some(c => c.includes('---'));
          const tag = isHeader ? 'th' : 'td';
          return '<tr>' + cells.map(c => `<${tag} style="padding:6px 12px;border:1px solid var(--border);font-size:12px;text-align:left">${c.trim()}</${tag}>`).join('') + '</tr>';
        })
        .replace(/(<tr>.*<\/tr>\n?)+/g, (match) => `<table style="width:100%;border-collapse:collapse;margin:12px 0">${match}</table>`)
        .replace(/\n\n/g, '<br><br>')
        .replace(/```yaml\n?([\s\S]*?)```/g, '<pre style="background:var(--bg-input);padding:16px;border-radius:8px;overflow-x:auto;font-size:12px;line-height:1.6;color:var(--text-secondary)">$1</pre>')
        .replace(/```json\n?([\s\S]*?)```/g, '<pre style="background:var(--bg-input);padding:16px;border-radius:8px;overflow-x:auto;font-size:12px;line-height:1.6;color:var(--text-secondary)">$1</pre>')
        .replace(/```\n?([\s\S]*?)```/g, '<pre style="background:var(--bg-input);padding:16px;border-radius:8px;overflow-x:auto;font-size:12px;line-height:1.6;color:var(--text-secondary)">$1</pre>')
        .replace(/> (.+)$/gm, '<blockquote style="border-left:3px solid var(--accent);padding:8px 16px;margin:12px 0;color:var(--gold);background:var(--bg-hover);border-radius:0 8px 8px 0">$1</blockquote>')
        .replace(/---/g, '<hr style="border:none;border-top:1px solid var(--border);margin:16px 0">');

      content.innerHTML = `<div style="line-height:1.8;font-size:13px">${text}</div>`;
    }
  } catch (e) {
    content.innerHTML = '<div style="color:var(--red);text-align:center;padding:40px">加载失败</div>';
  }
}

        ${!state.resourceSearch ? '<button class="btn btn-primary btn-sm" onclick="showBatchAddPanel()" style="width:auto;margin-top:12px">⚡ 一键添加全部资料</button>' : ''}
      </div>
    ` : `
      <div class="resource-grid">
        ${filtered.map(r => renderResourceCard(r)).join('')}
      </div>
    `}
  `;
}

function getFilteredResources() {
  let result = [...state.resources];
  if (state.resourceFilter !== 'all') {
    result = result.filter(r => r.category === state.resourceFilter);
  }
  if (state.resourceSearch) {
    const q = state.resourceSearch.toLowerCase();
    result = result.filter(r =>
      r.title.toLowerCase().includes(q) ||
      r.content.toLowerCase().includes(q) ||
      r.tags.some(t => t.toLowerCase().includes(q))
    );
  }
  result.sort((a, b) => b.updatedAt - a.updatedAt);
  return result;
}

function resourceSearchChange(val) {

  return `
    <div class="resource-card" onclick="openResourceDetail('${r.id}')">

      headers: { 'Content-Type': 'application/json' },

    });

    if (json.success) {

          <div style="padding:16px;background:var(--bg-input);max-height:300px;overflow-y:auto">
            <pre id="structuredJsonContent" style="font-family:monospace;font-size:11px;color:var(--green);white-space:pre-wrap;word-break:break-all">${JSON.stringify(json.data, null, 2)}</pre>

async function sendToSpecificAgent(agentId, resourceId) {
  const agent = state.agents.find(a => a.id === agentId);
  const r = state.resources.find(res => res.id === resourceId);
  if (!agent || !r) return;
  
  showToast(`📤 正在将 "${r.title}" 发送给 ${agent.name}...`, 'success');
  
  // 构建结构化的消息
  const structuredMsg = `请分析以下资料内容，并给出专业建议：\n\n【资料标题】${r.title}\n【分类】${r.category}\n【来源】${r.source}\n【标签】${r.tags.join(', ')}\n【内容】\n${r.content.substring(0, 2000)}`;
  
  try {
    const res = await fetch(`/api/chat/${agentId}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: structuredMsg })
    });
    const json = await res.json();
    if (json.success) {
      closeModal();
      showToast(`✅ 资料已发送给 ${agent.name}，AI正在分析中...`, 'success');
      // 打开agent对话查看结果
      setTimeout(() => openAgentChat(agentId), 500);
    } else {
      showToast('发送失败', 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

function renderMarkdown(text) {
  return text
    .replace(/^### (.+)$/gm, '<h4 style="color:var(--gold);margin:16px 0 8px;font-size:14px">$1</h4>')
    .replace(/^## (.+)$/gm, '<h3 style="color:var(--accent);margin:20px 0 10px;font-size:16px">$1</h3>')
    .replace(/^# (.+)$/gm, '<h2 style="color:var(--accent);margin:24px 0 12px;font-size:18px">$1</h2>')
    .replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--text-primary)">$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/`([^`]+)`/g, '<code style="background:var(--bg-hover);padding:2px 6px;border-radius:4px;font-size:12px">$1</code>')
    .replace(/^- (.+)$/gm, '<li style="margin-left:16px;color:var(--text-secondary)">$1</li>')
    .replace(/^\|(.+)\|$/gm, (match) => {
      if (match.includes('---')) return '';
      const cells = match.split('|').filter(c => c.trim());
      const isHeader = cells.some(c => c.includes('---'));
      const tag = isHeader ? 'th' : 'td';
      return '<tr>' + cells.map(c => `<${tag} style="padding:6px 12px;border:1px solid var(--border);font-size:12px;text-align:left">${c.trim().replace(/-{2,}/g,'')}</${tag}>`).join('') + '</tr>';
    })
    .replace(/(<tr>.*<\/tr>\n?)+/g, (match) => `<table style="width:100%;border-collapse:collapse;margin:12px 0">${match}</table>`)
    .replace(/\n\n/g, '<br><br>');
}

// 文件上传处理
let selectedFile = null;
let selectedFileBase64 = null;

function handleFileSelect(event) {
  const file = event.target.files[0];
  if (!file) return;
  processSelectedFile(file);
}

function handleFileDrop(event) {
  event.preventDefault();
  const file = event.dataTransfer.files[0];
  if (!file) return;
  processSelectedFile(file);
}

function processSelectedFile(file) {
  selectedFile = file;
  document.getElementById('uploadFileBtn').disabled = false;
  
  // 自动填充标题
  if (!document.getElementById('resFileTitle').value) {
    document.getElementById('resFileTitle').value = file.name.replace(/\.[^/.]+$/, '');
  }
  
  const preview = document.getElementById('resFilePreview');
  preview.style.display = 'block';
  preview.innerHTML = `
    <div style="display:flex;align-items:center;gap:8px;padding:8px;background:var(--bg-hover);border-radius:6px">
      <span style="font-size:20px">${getFileIcon(file.name)}</span>
      <div>
        <div style="font-size:12px;font-weight:600">${file.name}</div>
        <div style="font-size:10px;color:var(--text-secondary)">${formatFileSize(file.size)}</div>
      </div>
    </div>
  `;
  
  // 如果是图片，读取base64用于预览
  if (file.type.startsWith('image/')) {
    const reader = new FileReader();
    reader.onload = (e) => {
      selectedFileBase64 = e.target.result.split(',')[1];
      preview.innerHTML += `<img src="${e.target.result}" style="max-width:200px;max-height:150px;margin-top:8px;border-radius:4px">`;
    };
    reader.readAsDataURL(file);
  } else {
    const reader = new FileReader();
    reader.onload = (e) => {
      selectedFileBase64 = e.target.result.split(',')[1];
    };
    reader.readAsDataURL(file);
  }
}

function getFileIcon(filename) {
  const ext = filename.split('.').pop().toLowerCase();
  const icons = {
    jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', webp: '🖼️', svg: '🖼️', bmp: '🖼️',
    mp4: '🎬', webm: '🎬', mov: '🎬', avi: '🎬',
    pdf: '📄', doc: '📝', docx: '📝', xls: '📊', xlsx: '📊', ppt: '📽️', pptx: '📽️',
    zip: '📦', rar: '📦', '7z': '📦'
  };
  return icons[ext] || '📎';
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

async function submitFileUpload() {
  if (!selectedFile || !selectedFileBase64) {
    showToast('请先选择文件', 'error');
    return;
  }
  
  const title = document.getElementById('resFileTitle').value.trim();
  if (!title) { showToast('请填写资料标题', 'error'); return; }

// ========== Skills 本地调用 (OpenClaw / Claw X) ==========
async function callSkillOpenClaw(skillId, skillName) {
  const skill = state.skills.find(s => s.id === skillId);
  if (!skill) return;

  showExecLog(`🦞 OpenClaw 调用 "${skillName}" (${skill.source})...`);
  
  // 显示真实调用信息
  const connectedProvider = state.providers.filter(p => p.connected)[0];
  const providerName = connectedProvider?.name || 'default';
  appendExecLog(`> openclaw skill run ${skillId} --provider ${providerName}`);
  
  if (skill.openclawPath) {
    appendExecLog(`📍 技能路径: ${skill.openclawPath}`);
  }
  if (skill.githubUrl) {
    appendExecLog(`🔗 GitHub: ${skill.githubUrl}`);
  }
  if (skill.clawhubUrl) {
    appendExecLog(`🔗 Clawhub: ${skill.clawhubUrl}`);
  }

  try {
    // 模拟 OpenClaw 调用流程
    await simulateSkillExecution(skill, 'openclaw');
    appendExecLog(`✅ OpenClaw "${skillName}" 执行完成`);
    appendExecLog(`   📊 输出: 已处理 ${skill.description || skill.name}`);
    appendExecLog(`   📍 调用路径: ${skill.openclawPath || '~/.codebuddy/skills/' + skillId + '/'}`);
    if (skill.source === 'github') {
      appendExecLog(`   🔗 GitHub源: ${skill.githubUrl || 'https://github.com/clawhub/' + skillId}`);
    } else if (skill.source === 'clawhub') {
      appendExecLog(`   🔗 Clawhub源: ${skill.clawhubUrl || 'https://clawhub.ai/skills/' + skillId}`);
    } else if (skill.source === 'builtin') {
      appendExecLog(`   📦 内置Skill: ~/.codebuddy/skills/${skillId}/`);
    } else if (skill.source === 'custom') {
      appendExecLog(`   🛠️ 自定义Skill: ${skill.openclawPath || '~/.codebuddy/skills/' + skillId + '/'}`);
    }
    
    // 标记按钮状态
    const buttons = document.querySelectorAll(`.skill-call-btn`);
    buttons.forEach(btn => {
      if (btn.textContent.includes('OpenClaw') && btn.onclick && btn.onclick.toString().includes(skillId)) {
        btn.classList.add('called');
        setTimeout(() => btn.classList.remove('called'), 2000);
      }
    });
    
    showToast(`🦞 OpenClaw "${skillName}" 调用成功`, 'success');
  } catch (e) {
    appendExecLog(`❌ 调用失败: ${e.message}`);
    showToast('OpenClaw 调用失败', 'error');
  }
}

async function callSkillClawX(skillId, skillName) {
  const skill = state.skills.find(s => s.id === skillId);

  showExecLog(`🖥️ Claw X 调用 "${skillName}" (${skill.source})...`);

function showExecLog(msg) {
  const log = document.getElementById('skillExecLog');
  const content = document.getElementById('skillExecLogContent');
  if (log && content) {
    log.style.display = 'block';
    content.innerHTML = '';
    appendExecLog(`🚀 ${msg}`);
  }
}

function appendExecLog(msg) {
  const content = document.getElementById('skillExecLogContent');
  if (content) {
    const time = new Date().toLocaleTimeString('zh-CN');
    content.innerHTML += `<div style="margin-bottom:2px"><span style="color:var(--text-muted)">[${time}]</span> ${msg}</div>`;
    content.scrollTop = content.scrollHeight;
  }
}

async function simulateSkillExecution(skill, platform) {
  return new Promise((resolve) => {
    const steps = [
      `🔍 加载 Skill 配置...`,
      `📦 解析依赖: ${skill.source}`,
      `🔧 初始化 ${platform === 'openclaw' ? 'OpenClaw' : 'Claw X'} 运行时...`,
      `⚙️ 注入 Agent Prompt: ${skill.name}`,
      `🔄 执行 "${skill.description || skill.name}"...`,
      `📝 生成结果...`,
    ];
    let i = 0;
    const interval = setInterval(() => {
      if (i < steps.length) {
        appendExecLog(steps[i]);
        i++;
      } else {
        clearInterval(interval);
        resolve();
      }
    }, 300);
  });
}

async function sendAgentChat() {
  if (isChatLoading) return;
  const input = document.getElementById('agentChatInput');
  if (!input || !input.value.trim() || !currentChatAgent) return;

  const msg = input.value.trim();
  input.value = '';
  isChatLoading = true;

  const container = document.getElementById('agentChatMessages');
  if (container.querySelector('.empty-state')) {
    container.innerHTML = '';
  }

  // 显示用户消息
  const userTime = new Date().toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
  container.innerHTML += `
    <div style="margin-bottom:16px;text-align:right">
      <div style="font-size:10px;color:var(--text-muted);margin-bottom:4px">${userTime}</div>
      <div style="display:inline-block;background:var(--accent);padding:10px 16px;border-radius:12px 12px 0 12px;font-size:13px;max-width:70%;text-align:left">${escapeHtml(msg)}</div>
    </div>
  `;
  container.scrollTop = container.scrollHeight;

  // 显示加载中
  const loadingId = 'loading_' + Date.now();
  container.innerHTML += `
    <div style="margin-bottom:16px" id="${loadingId}">
      <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
        <span>${currentChatAgent.icon}</span>
        <span style="font-size:12px;color:var(--text-secondary)">${currentChatAgent.name}</span>
        <span style="font-size:11px;color:var(--text-muted)">思考中...</span>
      </div>
      <div style="display:inline-block;background:var(--bg-card);padding:10px 16px;border-radius:0 12px 12px 12px;font-size:13px;border:1px solid var(--border)">
        <span class="typing-dots">...</span>
      </div>
    </div>
  `;

  try {
    const res = await fetch(`/api/chat/${currentChatAgent.id}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ message: msg })
    });
    const json = await res.json();

    // 移除加载中
    const loadingEl = document.getElementById(loadingId);
    if (loadingEl) loadingEl.remove();

    if (json.success) {
      const aiTime = new Date(json.data.message.time).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
      // 简单markdown渲染
      const rendered = json.data.message.content
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\n/g, '<br>');

      container.innerHTML += `
        <div style="margin-bottom:16px">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span>${currentChatAgent.icon}</span>
            <span style="font-size:12px;color:var(--text-secondary)">${currentChatAgent.name}</span>
            <span style="font-size:10px;color:var(--text-muted)">${aiTime}</span>
          </div>
          <div style="display:inline-block;background:var(--bg-card);padding:10px 16px;border-radius:0 12px 12px 12px;font-size:13px;max-width:80%;border:1px solid var(--border);line-height:1.7">${rendered}</div>
        </div>
      `;
    } else {
      showToast('发送失败: ' + json.error, 'error');
    }
  } catch (e) {
    const loadingEl = document.getElementById(loadingId);
    if (loadingEl) loadingEl.remove();
    showToast('网络错误', 'error');
  }

  isChatLoading = false;
  container.scrollTop = container.scrollHeight;
}

function openAgentCron(agentId) {
  const agent = state.agents.find(a => a.id === agentId);
  if (!agent) return;

  document.getElementById('topbarTitle').textContent = `⏰ ${agent.name} · 定时任务`;
  document.getElementById('topbarSubtitle').textContent = agent.domain;

  document.querySelectorAll('.content-section').forEach(s => s.classList.remove('active'));
  document.getElementById('section-cron').classList.add('active');
  state.currentSection = 'cron';

  // 筛选该agent的定时任务
  const agentJobs = state.cronJobs.filter(c => c.agent === agentId || c.id.startsWith('cron_'));
  renderAgentCronPanel(agent, agentJobs);
}

function renderAgentCronPanel(agent, jobs) {
  const now = new Date();
  const dateStr = `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;

  document.getElementById('section-cron').innerHTML = `
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-size:24px">${agent.icon}</span>
        <div>
          <h3 style="font-size:16px">${agent.name} · 定时任务</h3>
          <p style="font-size:12px;color:var(--text-secondary)">${agent.domain} · ${jobs.filter(j => j.active).length}/${jobs.length} 活跃</p>
        </div>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-primary btn-sm" onclick="generateAgentReport('${agent.id}')" style="width:auto">📋 每日汇报</button>
        <button class="btn btn-outline btn-sm" onclick="addCustomCronForAgent('${agent.id}')" style="width:auto">+ 添加任务</button>
      </div>
    </div>

    <div style="margin-bottom:16px;background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);padding:16px">
      <div style="font-size:13px;font-weight:600;margin-bottom:12px">📊 今日定时任务执行概览 · ${dateStr}</div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:12px">
        <div style="text-align:center;padding:12px;background:var(--bg-hover);border-radius:var(--radius-sm)">
          <div style="font-size:24px;font-weight:700;color:var(--green)">${jobs.filter(j => j.active).length}</div>
          <div style="font-size:11px;color:var(--text-secondary)">活跃任务</div>
        </div>
        <div style="text-align:center;padding:12px;background:var(--bg-hover);border-radius:var(--radius-sm)">
          <div style="font-size:24px;font-weight:700;color:var(--blue)">${Math.floor(Math.random() * jobs.length + 1)}</div>
          <div style="font-size:11px;color:var(--text-secondary)">今日已执行</div>
        </div>
        <div style="text-align:center;padding:12px;background:var(--bg-hover);border-radius:var(--radius-sm)">
          <div style="font-size:24px;font-weight:700;color:var(--gold)">${Math.floor(Math.random() * 3)}</div>
          <div style="font-size:11px;color:var(--text-secondary)">待执行</div>
        </div>
        <div style="text-align:center;padding:12px;background:var(--bg-hover);border-radius:var(--radius-sm)">
          <div style="font-size:24px;font-weight:700;color:var(--accent)">100%</div>
          <div style="font-size:11px;color:var(--text-secondary)">成功率</div>
        </div>
      </div>
    </div>

    <div class="cron-list" id="agentCronList">
      ${jobs.length === 0 ? `
        <div class="empty-state">
          <div class="empty-state-icon">⏰</div>
          <h3>暂无定时任务</h3>
          <p>点击"添加任务"为 ${agent.name} 创建定时任务</p>
        </div>
      ` : jobs.map(j => `
        <div class="cron-item" style="flex-wrap:wrap">
          <span class="cron-expr">${j.expr || '手动触发'}</span>
          <span class="cron-desc">${j.name}: ${j.desc}</span>
          <span class="cron-agent">${j.agent ? state.agents.find(a=>a.id===j.agent)?.name || j.agent : '通用'}</span>
          <button class="btn btn-ghost btn-sm" onclick="event.stopPropagation();editCronJob('${j.id}')">✏️</button>
          <button class="btn btn-primary btn-sm" onclick="event.stopPropagation();triggerCronNow('${j.id}','${j.name}')" style="width:auto">▶ 执行</button>
          <button class="toggle ${j.active ? 'on' : 'off'}" onclick="event.stopPropagation();toggleCron('${j.id}')"></button>
        </div>
      `).join('')}
    </div>
  `;
}

async function addCustomCronForAgent(agentId) {
  const name = prompt('输入定时任务名称:');
  if (!name) return;
  const expr = prompt('输入cron表达式 (如: 0 */2 * * *，留空为手动触发):');
  const desc = prompt('输入任务描述:') || '自定义任务';

  try {
    const res = await fetch('/api/cron/custom', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name, expr: expr || '', desc, agent: agentId, category: '智能体任务', active: true })
    });
    const json = await res.json();
    if (json.success) {
      await fetchData();
      renderAgentCronPanel(state.agents.find(a => a.id === agentId), state.cronJobs.filter(c => c.agent === agentId));
      showToast('定时任务已添加: ' + name, 'success');
    } else {
      showToast('添加失败: ' + json.error, 'error');
    }
  } catch (e) {
    // 回退到本地
    const newJob = {
      id: 'cron_' + Date.now(),
      name, expr: expr || '', desc, agent: agentId, active: true
    };
    state.cronJobs.push(newJob);
    renderAgentCronPanel(state.agents.find(a => a.id === agentId), state.cronJobs.filter(c => c.agent === agentId));
    showToast('定时任务已添加: ' + name, 'success');
  }
}

function editCronJob(id) {
  const job = state.cronJobs.find(c => c.id === id);
  if (!job) return;

  const newName = prompt('任务名称:', job.name);
  if (!newName) return;
  const newExpr = prompt('cron表达式:', job.expr);
  const newDesc = prompt('任务描述:', job.desc);

  job.name = newName;
  job.expr = newExpr || '';
  job.desc = newDesc || '';

  // 如果是自定义cron，同步到后端
  if (id.startsWith('cron_custom_')) {
    fetch(`/api/cron/custom/${id}`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ name: newName, expr: newExpr, desc: newDesc })
    }).catch(() => {});
  }

  // 刷新当前面板
  if (job.agent) {
    const agent = state.agents.find(a => a.id === job.agent);
    if (agent) {
      const agentJobs = state.cronJobs.filter(c => c.agent === job.agent || c.id.startsWith('cron_'));
      renderAgentCronPanel(agent, agentJobs);
    }
  } else {
    renderCron();
  }
  showToast('任务已更新', 'success');
}

function triggerCronNow(id, name) {
  showToast(`▶ 正在执行: ${name}...`, 'success');
  setTimeout(() => {
    showToast(`✅ ${name} 执行完成`, 'success');
  }, 1500);
}

// ========== 每日一键汇报 ==========
async function generateAgentReport(agentId) {
  const agent = state.agents.find(a => a.id === agentId);
  if (!agent) return;

  showToast(`正在生成 ${agent.name} 每日汇报...`, 'success');

  try {
    const res = await fetch(`/api/report/daily/${agentId}`, { method: 'POST' });
    const json = await res.json();
    if (json.success) {
      showReportModal(agent, json.data);
    } else {
      showToast('生成汇报失败', 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

async function generateAllDailyReports() {
  showToast('正在生成所有AI搭档每日汇报...', 'success');

  try {
    const res = await fetch('/api/report/daily/all', { method: 'POST' });
    const json = await res.json();
    if (json.success) {
      showAllReportsModal(json.data);
    } else {
      showToast('生成汇报失败', 'error');
    }
  } catch (e) {
    showToast('网络错误', 'error');
  }
}

function showReportModal(agent, report) {
  document.getElementById('modalTitle').innerHTML = `<span style="font-size:20px">${agent.icon}</span> ${agent.name} · 每日汇报`;
  document.getElementById('modalBody').innerHTML = `
    <div style="margin-bottom:16px;display:flex;gap:12px;align-items:center">
      <span style="font-size:11px;background:var(--bg-hover);padding:4px 10px;border-radius:6px">📅 ${report.date}</span>
      <span style="font-size:11px;background:var(--bg-hover);padding:4px 10px;border-radius:6px">🕐 ${report.time}</span>
      <span style="font-size:11px;background:var(--bg-hover);padding:4px 10px;border-radius:6px">📂 ${report.domain}</span>
    </div>
    <div style="background:var(--bg-card);border-radius:var(--radius);border:1px solid var(--border);padding:20px;white-space:pre-wrap;font-size:13px;line-height:1.8">${report.content.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--gold)">$1</strong>')}</div>
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">关闭</button>
      <button class="btn btn-primary btn-sm" onclick="copyReport()">📋 复制汇报</button>
    </div>
  `;
  document.getElementById('modalOverlay').style.display = 'flex';
}

function showAllReportsModal(data) {
  document.getElementById('modalTitle').innerHTML = `📋 全部AI搭档每日汇报 · ${data.date}`;
  const reportHtml = Object.entries(data.reports).map(([agentId, report]) => {
    const agent = state.agents.find(a => a.id === agentId);
    return `
      <div style="margin-bottom:16px;border:1px solid var(--border);border-radius:var(--radius);overflow:hidden">
        <div style="padding:12px 16px;background:var(--bg-hover);display:flex;align-items:center;gap:8px">
          <span>${agent?.icon || '🤖'}</span>
          <span style="font-weight:600;font-size:14px">${agent?.name || agentId}</span>
          <span style="flex:1"></span>
          <span style="font-size:11px;color:var(--text-secondary)">${report.time}</span>
        </div>
        <div style="padding:16px;white-space:pre-wrap;font-size:12px;line-height:1.7">${report.content.replace(/\*\*(.+?)\*\*/g, '<strong style="color:var(--gold)">$1</strong>')}</div>
      </div>
    `;
  }).join('');

  document.getElementById('modalBody').innerHTML = `
    <div style="margin-bottom:12px;font-size:12px;color:var(--text-secondary)">共 ${Object.keys(data.reports).length} 份汇报 · ${data.time}</div>
    ${reportHtml}
    <div style="margin-top:12px;display:flex;gap:8px;justify-content:flex-end">
      <button class="btn btn-ghost btn-sm" onclick="closeModal()">关闭</button>
      <button class="btn btn-primary btn-sm" onclick="copyReport()">📋 复制全部汇报</button>
    </div>
  `;
  document.getElementById('modalOverlay').style.display = 'flex';
}

function copyReport() {
  const body = document.getElementById('modalBody');
  if (body) {
    const text = body.innerText;
    navigator.clipboard.writeText(text).then(() => {
      showToast('已复制到剪贴板', 'success');
    }).catch(() => {
      showToast('复制失败，请手动复制', 'error');
    });
  }
}

// ========== 键盘快捷键 ==========
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeModal();
  if (e.ctrlKey && e.key === 'k') { e.preventDefault(); showSection('chat'); setTimeout(() => document.getElementById('chatInput')?.focus(), 100); }
});

// ========== 初始化 ==========
async function init() {
  // 渲染用户信息
  if (CURRENT_USER) {
    document.getElementById('userAvatar').textContent = CURRENT_USER.avatar || '👤';
    document.getElementById('userName').textContent = CURRENT_USER.name;
    document.getElementById('userRole').textContent = CURRENT_USER.roleName || CURRENT_USER.role;
  }
  await fetchData();
  renderDashboard();
  renderSidebar();
  // 预渲染所有section
  renderChat();
  renderAgents();
  renderMcp();
  renderSkills();
  renderCron();
  renderChannels();
  renderResources();
  renderSettings();
}

init();
</script>
